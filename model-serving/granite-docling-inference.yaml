---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    argocd.argoproj.io/managed-by: openshift-gitops
    argocd.argoproj.io/sync-wave: "1"
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: Docling Serve ServingRuntime for KServe
    opendatahub.io/template-name: docling-serve-runtime
    openshift.io/display-name: docling-serve
  name: docling-serve-v0.7.0
  namespace: llm-hosting
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '5001'
  containers:
    - image: 'quay.io/docling-project/docling-serve-cu124:v0.7.0'
      name: kserve-container
      command:
        - python
        - '-m'
        - docling_serve
        - run
      ports:
        - containerPort: 5001
          protocol: TCP
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: Docling
  volumes:
    - emptyDir:
        medium: Memory
        sizeLimit: 2Gi
      name: shm
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    openshift.io/display-name: Granite-Docling-258M
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/revisionHistoryLimit: "1"
  name: granite-docling-258m
  namespace: llm-hosting
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  predictor:
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: Docling
      name: ''
      resources:
        limits:
          cpu: '4'
          memory: 8Gi
          nvidia.com/gpu: '1'
        requests:
          cpu: '2'
          memory: 4Gi
          nvidia.com/gpu: '1'
      runtime: docling-serve-v0.7.0
      storage:
        key: aws-connection-models
        path: ibm-granite/granite-docling-258M/
    nodeSelector:
      beta.kubernetes.io/instance-type: g6.2xlarge
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        value: "L4-gpu"
        operator: Equal
